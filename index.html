<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0b0a12" />
  <title>Tavole dei Destini</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="stars" class="stars" aria-hidden="true"></div>

  <main id="app">

    <!-- ===================== HOME ===================== -->
    <section class="view" id="view-home" data-view="home">
      <div class="home-content">
        <h1 class="home-title">Tavole<span>dei</span>Destini</h1>
        <p class="home-sub">Tieni premuto per varcare la soglia</p>

        <button class="hold-btn" id="hold-start" aria-label="Incontra il Destino — tieni premuto">
          <span class="hold-fill" id="hold-fill" aria-hidden="true"></span>
          <span class="hold-label">Incontra il Destino</span>
        </button>
        <p class="home-hint" id="hold-hint">tieni premuto per entrare</p>
      </div>
    </section>

    <!-- ===================== SCELTA ===================== -->
    <section class="view" id="view-choice" data-view="choice">
      <header class="view-head">
        <button class="icon-btn back-btn" data-back aria-label="Indietro">‹</button>
        <h2 class="view-title">Scegli il tuo ruolo</h2>
        <span class="head-spacer"></span>
      </header>
      <div class="choice-grid">
        <button class="choice-card choice-master" data-goto="master">
          <div class="choice-glow"></div>
          <div class="choice-icon">📜</div>
          <h3>Master</h3>
          <p>Crea e gestisci le regole, il mondo e le sessioni</p>
        </button>
        <button class="choice-card choice-player" data-goto="player">
          <div class="choice-glow"></div>
          <div class="choice-icon">⚔️</div>
          <h3>Player</h3>
          <p>Accedi alle tue schede personaggio e gioca</p>
        </button>
      </div>
    </section>

    <!-- ===================== MASTER (plancia) ===================== -->
    <section class="view" id="view-master" data-view="master">
      <header class="view-head">
        <button class="to-menu" data-tomenu aria-label="Torna al menu">‹ Menu</button>
        <h2 class="view-title">Plancia del Master</h2>
        <button class="icon-btn nav-burger" id="master-menu-btn" aria-label="Apri menu">☰</button>
      </header>
      <div class="master-body" id="master-body"></div>
    </section>

    <!-- ===================== PLAYER: selezione schede ===================== -->
    <section class="view" id="view-player" data-view="player">
      <header class="view-head">
        <button class="to-menu" data-tomenu aria-label="Torna al menu">‹ Menu</button>
        <h2 class="view-title" id="player-title">Le tue schede</h2>
        <button class="icon-btn nav-burger" id="player-menu-btn" aria-label="Apri menu">☰</button>
      </header>

      <div class="breadcrumb" id="player-breadcrumb"></div>

      <div class="toolbar" id="player-toolbar">
        <button class="tool-btn primary" data-action="create"><span>＋</span> Crea scheda</button>
        <button class="tool-btn" data-action="new-folder"><span>📁</span> Crea cartella</button>
        <button class="tool-btn" data-action="toggle-move"><span>↔</span> Sposta</button>
        <button class="tool-btn danger" data-action="toggle-delete"><span>🗑</span> Elimina</button>
      </div>

      <div class="list" id="player-list"></div>
    </section>

    <!-- ===================== CREAZIONE PG ===================== -->
    <section class="view" id="view-create" data-view="create">
      <header class="view-head">
        <button class="icon-btn back-btn" data-back aria-label="Indietro">‹</button>
        <h2 class="view-title">Nuovo personaggio</h2>
        <span class="head-spacer"></span>
      </header>
      <form class="create-form" id="create-form" autocomplete="off">
        <div class="field">
          <label for="f-nome">Nome</label>
          <input type="text" id="f-nome" name="nome" required maxlength="40" placeholder="Es. Arannis" />
        </div>
        <div class="field">
          <label for="f-cognome">Cognome</label>
          <input type="text" id="f-cognome" name="cognome" maxlength="40" placeholder="Es. Mezzanotte" />
        </div>
        <div class="field-row">
          <div class="field">
            <label for="f-razza">Razza</label>
            <input type="text" id="f-razza" name="razza" maxlength="40" placeholder="Es. Elfo" />
          </div>
          <div class="field">
            <label for="f-classe">Classe</label>
            <input type="text" id="f-classe" name="classe" maxlength="40" placeholder="Es. Ranger" />
          </div>
        </div>
        <div class="field">
          <label for="f-descrizione">Descrizione</label>
          <textarea id="f-descrizione" name="descrizione" rows="4" maxlength="800" placeholder="Aspetto, storia, personalità..."></textarea>
        </div>
        <button type="submit" class="tool-btn primary big">Conferma</button>
      </form>
    </section>

    <!-- ===================== SCHEDA PG ===================== -->
    <section class="view" id="view-sheet" data-view="sheet">
      <header class="view-head">
        <span class="head-spacer"></span>
        <h2 class="view-title" id="sheet-title">Scheda</h2>
        <button class="icon-btn" id="sheet-export-btn" aria-label="Esporta scheda">⭳</button>
      </header>

      <div class="sheet-hero" id="sheet-hero"></div>

      <div class="sheet-nav">
        <button class="menu-btn" id="sheet-menu-btn" aria-label="Apri menu sezioni" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
        <span class="sheet-section-label" id="sheet-section-label">Statistiche</span>
      </div>

      <div class="sheet-panel" id="sheet-panel"></div>

      <!-- Drawer di navigazione sezioni -->
      <div class="drawer-overlay" id="drawer-overlay"></div>
      <aside class="drawer" id="sheet-drawer" aria-hidden="true">
        <div class="drawer-head">
          <span>Sezioni</span>
          <button class="icon-btn" id="drawer-close" aria-label="Chiudi menu">×</button>
        </div>
        <nav class="drawer-nav" id="drawer-nav">
          <button class="drawer-item" data-section="home"><span class="tab-ico">🏠</span>Panoramica</button>
          <button class="drawer-item" data-section="statistiche"><span class="tab-ico">📊</span>Statistiche</button>
          <button class="drawer-item" data-section="abilita"><span class="tab-ico">✨</span>Abilità</button>
          <button class="drawer-item" data-section="armamenti"><span class="tab-ico">🗡️</span>Armamenti</button>
          <button class="drawer-item" data-section="zaino"><span class="tab-ico">🎒</span>Zaino</button>
          <button class="drawer-item" data-section="combattimento"><span class="tab-ico">🔥</span>Combattimento</button>
          <div class="drawer-sep"></div>
          <button class="drawer-item" data-nav="messages"><span class="tab-ico">💬</span>Messaggi</button>
          <button class="drawer-item" data-nav="session"><span class="tab-ico">🔗</span>Sessione</button>
          <button class="drawer-item" data-nav="player"><span class="tab-ico">🗂️</span>Le tue schede</button>
        </nav>
      </aside>
    </section>

    <!-- ===================== SESSIONE (collegamento) ===================== -->
    <section class="view" id="view-session" data-view="session">
      <header class="view-head">
        <span class="head-spacer"></span>
        <h2 class="view-title">Sessione</h2>
        <button class="icon-btn nav-burger" id="session-menu-btn" aria-label="Apri menu">☰</button>
      </header>
      <div class="session-body" id="session-body"></div>
    </section>

    <!-- ===================== MESSAGGI ===================== -->
    <section class="view" id="view-messages" data-view="messages">
      <header class="view-head">
        <span class="head-spacer"></span>
        <h2 class="view-title">Messaggi</h2>
        <button class="icon-btn nav-burger" id="messages-menu-btn" aria-label="Apri menu">☰</button>
      </header>
      <div class="chat-wrap">
        <div class="chat-log" id="chat-log"></div>
        <div class="chat-composer" id="chat-composer">
          <div class="chat-to-row">
            <span class="chat-to-label">A:</span>
            <button class="chat-to" id="chat-to" type="button" aria-label="Scegli destinatari">Tutti</button>
          </div>
          <div class="chat-input-row">
            <button class="icon-btn chat-attach" id="chat-attach-btn" aria-label="Allega immagine">🖼</button>
            <textarea class="chat-text" id="chat-text" rows="1" maxlength="1200" placeholder="Scrivi un messaggio..."></textarea>
            <button class="icon-btn chat-send" id="chat-send-btn" aria-label="Invia">➤</button>
          </div>
          <div class="chat-attach-preview" id="chat-attach-preview" hidden>
            <img id="chat-attach-img" alt="anteprima" />
            <button class="chat-attach-remove" id="chat-attach-remove" aria-label="Rimuovi immagine">×</button>
          </div>
        </div>
      </div>
      <input type="file" id="chat-file" accept="image/*" hidden />
    </section>

    <!-- ===================== EDITOR ABILITÀ (Master) ===================== -->
    <section class="view" id="view-ability-editor" data-view="ability-editor">
      <header class="view-head">
        <span class="head-spacer"></span>
        <h2 class="view-title">Abilità</h2>
        <button class="icon-btn nav-burger" id="abilities-menu-btn" aria-label="Apri menu">☰</button>
      </header>
      <div class="ability-editor-body" id="ability-editor-body"></div>
    </section>

  </main>

  <!-- ===================== DRAWER NAVIGAZIONE APP ===================== -->
  <div class="drawer-overlay" id="app-drawer-overlay"></div>
  <aside class="drawer" id="app-drawer" aria-hidden="true">
    <div class="drawer-head">
      <span>Menu</span>
      <button class="icon-btn" id="app-drawer-close" aria-label="Chiudi menu">×</button>
    </div>
    <nav class="drawer-nav" id="app-drawer-nav"></nav>
  </aside>

  <!-- ===================== ALBERO ABILITÀ (overlay) ===================== -->
  <div class="ability-overlay" id="ability-overlay" hidden>
    <div class="ao-head">
      <div class="ao-titles">
        <span class="ao-title" id="ao-title">Abilità</span>
        <span class="ao-sub" id="ao-sub"></span>
      </div>
      <span class="ao-points" id="ao-points"></span>
      <button class="icon-btn" id="ao-close" aria-label="Chiudi albero">×</button>
    </div>
    <div class="ao-scroll" id="ao-scroll"></div>
  </div>

  <!-- ===================== ANNUNCIO (messaggio importante dal Master) ===================== -->
  <div class="announce" id="announce" hidden>
    <div class="announce-card">
      <div class="announce-head">📢 Messaggio dal Master</div>
      <div class="announce-body" id="announce-body"></div>
      <button class="tool-btn primary" id="announce-close">Ho capito</button>
    </div>
  </div>

  <!-- ===================== IMMAGINE PROIETTATA (spotlight) ===================== -->
  <div class="spotlight" id="spotlight" hidden>
    <img class="spotlight-img" id="spotlight-img" alt="Immagine condivisa dal Master" />
    <div class="spotlight-cap" id="spotlight-cap"></div>
    <button class="spotlight-close" id="spotlight-close" aria-label="Chiudi immagine">×</button>
  </div>

  <!-- ===================== MODALE GENERICO ===================== -->
  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal" id="modal" role="dialog" aria-modal="true">
      <h3 class="modal-title" id="modal-title"></h3>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-actions" id="modal-actions"></div>
    </div>
  </div>

  <!-- ===================== TOAST ===================== -->
  <div class="toast" id="toast" hidden></div>

  <input type="file" id="import-file" accept="application/json" hidden />

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/net.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
